services:
  # 1. Database
  db:
    image: postgres:15
    container_name: seknna-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - seknna-network

  # 2. Backend
  backend:
    build: ./backend
    container_name: seknna-backend
    ports:
      - "${SPRING_PORT}:${SPRING_PORT}"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      - db
    networks:
      - seknna-network

  # 3. Frontend
  frontend:
    build: ./frontend
    container_name: seknna-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - seknna-network

networks:
  seknna-network:
    driver: bridge

volumes:
  postgres_data: